<!doctype html>
<html lang="en" data-page="appointments">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Appointments | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/logo/smartbiz-logo.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <!-- Sidebar -->

    <aside id="sidebar"></aside>

    <!-- Main Wrapper -->

    <div class="main-wrapper">
      <!-- Header -->

      <header id="header"></header>

      <!-- Main Content -->

      <main class="page-content">
        <div class="appointments-page">
          <!-- ==========================================================
                     PAGE HEADER
                ========================================================== -->

          <div class="page-header">
            <div>
              <h1>Appointments</h1>

              <p>Manage patient appointments and schedules.</p>
            </div>

            <button
              class="btn btn-primary open-modal"
              data-modal="add-appointment"
            >
              <i data-lucide="calendar-plus"></i>

              Add Appointment
            </button>
          </div>

          <!-- ==========================================================
     TOOLBAR
========================================================== -->

          <div class="card appointment-toolbar">
            <div class="toolbar">
              <div class="toolbar-search">
                <i data-lucide="search"></i>

                <input type="text" placeholder="Search appointment..." />
              </div>

              <div class="toolbar-actions">
                <button class="btn btn-secondary">
                  <i data-lucide="filter"></i>

                  Filter
                </button>

                <button class="btn btn-secondary">
                  <i data-lucide="download"></i>

                  Export
                </button>
              </div>
            </div>
          </div>

          <!-- ==========================================================
     APPOINTMENTS TABLE
========================================================== -->

          <div class="card">
            <div class="card-body">
              <div class="table-container">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Patient</th>

                      <th>Doctor</th>

                      <th>Date</th>

                      <th>Time</th>

                      <th>Status</th>

                      <th>Actions</th>
                    </tr>
                  </thead>

                  <tbody id="appointmentTableBody"></tbody>
                </table>
              </div>

              <div class="pagination">
                <button class="page-btn">&lt;</button>

                <button class="page-btn active">1</button>

                <button class="page-btn">2</button>

                <button class="page-btn">3</button>

                <button class="page-btn">&gt;</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer id="footer"></footer>
    </div>

    <div id="modalContainer"></div>

    <!-- JavaScript -->

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Components -->
    <script src="js/components/modal.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>

    <!-- Loader -->
    <script src="js/loader.js"></script>

    <!-- Utilities -->
    <script src="js/utils/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/ui.js"></script>

    <!-- App -->
    <script src="js/app.js"></script>

    <!-- Page -->
    <script src="js/pages/appointments.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
