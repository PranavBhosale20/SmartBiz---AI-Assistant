<div class="modal-header">
  <div class="modal-title">
    <h2>Doctor Details</h2>

    <p>View doctor profile information.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <div class="form-grid">
    <!-- ==========================================================
         DOCTOR ID
    ========================================================== -->

    <div class="form-group">
      <label class="form-label">Doctor ID</label>

      <input id="viewDoctorId" class="form-control" type="text" readonly />
    </div>

    <!-- ==========================================================
         DOCTOR NAME
    ========================================================== -->

    <div class="form-group">
      <label class="form-label">Doctor Name</label>

      <input id="viewDoctorName" class="form-control" type="text" readonly />
    </div>

    <!-- ==========================================================
         SPECIALIZATION
    ========================================================== -->

    <div class="form-group">
      <label class="form-label">Specialization</label>

      <input
        id="viewDoctorSpecialization"
        class="form-control"
        type="text"
        readonly
      />
    </div>

    <!-- ==========================================================
         SLOT DURATION
    ========================================================== -->

    <div class="form-group">
      <label class="form-label">Slot Duration (Minutes)</label>

      <input
        id="viewDoctorSlotDuration"
        class="form-control"
        type="text"
        readonly
      />
    </div>

    <!-- ==========================================================
         OPD TIMINGS
    ========================================================== -->

    <div class="form-group">
      <label class="form-label">OPD Start Time</label>

      <input
        id="viewDoctorStartTime"
        class="form-control"
        type="text"
        readonly
      />
    </div>

    <div class="form-group">
      <label class="form-label">OPD End Time</label>

      <input id="viewDoctorEndTime" class="form-control" type="text" readonly />
    </div>

    <!-- ==========================================================
         CREATED DATE
    ========================================================== -->

    <div class="form-group full-width">
      <label class="form-label">Created On</label>

      <input
        id="viewDoctorCreatedAt"
        class="form-control"
        type="text"
        readonly
      />
    </div>
  </div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-primary modal-close">Close</button>
</div>
