<div class="modal-header">
  <div class="modal-title">
    <h2 id="patientModalTitle">Add New Patient</h2>

    <p id="patientModalSubtitle">
      Register a new patient into SmartBiz Clinic OS.
    </p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <form id="patientForm" class="form-grid">
    <input type="hidden" id="patientId" />

    <!-- ==========================================================
         PERSONAL INFORMATION
    ========================================================== -->

    <div class="full-width">
      <h3 class="form-section-title">Personal Information</h3>
    </div>

    <div class="form-group">
      <label class="form-label" for="firstName">First Name</label>

      <input
        id="firstName"
        type="text"
        class="form-control"
        placeholder="Enter first name"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="lastName">Last Name</label>

      <input
        id="lastName"
        type="text"
        class="form-control"
        placeholder="Enter last name"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="dateOfBirth">Date of Birth</label>

      <input id="dateOfBirth" type="date" class="form-control" />
    </div>

    <div class="form-group">
      <label class="form-label" for="gender">Gender</label>

      <select id="gender" class="form-control">
        <option value="">Select Gender</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
    </div>

    <!-- ==========================================================
         CONTACT INFORMATION
    ========================================================== -->

    <div class="full-width">
      <h3 class="form-section-title">Contact Information</h3>
    </div>

    <div class="form-group">
      <label class="form-label" for="phone">Phone Number</label>

      <input
        id="phone"
        type="tel"
        class="form-control"
        placeholder="+91 9876543210"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>

      <input
        id="email"
        type="email"
        class="form-control"
        placeholder="example@email.com"
      />
    </div>

    <div class="form-group full-width">
      <label class="form-label" for="address">Address</label>

      <textarea
        id="address"
        class="form-control"
        placeholder="Enter complete address"
      ></textarea>
    </div>

    <!-- ==========================================================
         MEDICAL INFORMATION
    ========================================================== -->

    <div class="full-width">
      <h3 class="form-section-title">Medical Information</h3>
    </div>

    <div class="form-group">
      <label class="form-label" for="bloodGroup">Blood Group</label>

      <select id="bloodGroup" class="form-control">
        <option value="">Select</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>O+</option>
        <option>O-</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label" for="emergencyContact">
        Emergency Contact
      </label>

      <input
        id="emergencyContact"
        type="text"
        class="form-control"
        placeholder="+91 9876543210"
      />
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" id="cancelPatientBtn" class="btn btn-secondary">
    Cancel
  </button>

  <button type="button" id="savePatientBtn" class="btn btn-primary">
    <i data-lucide="save"></i>

    <span id="savePatientBtnText"> Save Patient </span>
  </button>
</div>
