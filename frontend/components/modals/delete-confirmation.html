<div class="modal-header">
  <div class="modal-title">
    <h2 id="deleteModalTitle">Delete Record</h2>

    <p id="deleteModalSubtitle">This action cannot be undone.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <div class="delete-confirmation">
    <i data-lucide="triangle-alert" class="delete-icon"></i>

    <p id="deleteModalMessage">
      Are you sure you want to permanently delete this record?
    </p>
  </div>
</div>

<div class="modal-footer">
  <button type="button" id="cancelDeleteBtn" class="btn btn-secondary">
    Cancel
  </button>

  <button type="button" id="confirmDeleteBtn" class="btn btn-danger">
    <i data-lucide="trash-2"></i>

    <span id="confirmDeleteText"> Delete </span>
  </button>
</div>
