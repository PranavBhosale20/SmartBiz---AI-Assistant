<div class="modal-overlay">
  <div class="modal modal-lg">
    <!-- ==========================================================
         HEADER
    ========================================================== -->

    <div class="modal-header">
      <div>
        <h2>Prescription Details</h2>

        <p>Prescription information and prescribed medicines.</p>
      </div>

      <button class="modal-close">
        <i data-lucide="x"></i>
      </button>
    </div>

    <!-- ==========================================================
         BODY
    ========================================================== -->

    <div class="modal-body">
      <div class="info-grid">
        <div class="info-item">
          <label>Prescription ID</label>

          <p id="viewPrescriptionId">-</p>
        </div>

        <div class="info-item">
          <label>Appointment ID</label>

          <p id="viewAppointmentId">-</p>
        </div>

        <div class="info-item">
          <label>Patient</label>

          <p id="viewPrescriptionPatient">-</p>
        </div>

        <div class="info-item">
          <label>Doctor</label>

          <p id="viewPrescriptionDoctor">-</p>
        </div>

        <div class="info-item">
          <label>Created On</label>

          <p id="viewPrescriptionDate">-</p>
        </div>
      </div>

      <div class="form-group">
        <label>Doctor Notes</label>

        <textarea
          id="viewPrescriptionNotes"
          class="form-control"
          rows="3"
          readonly
        ></textarea>
      </div>

      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Medicine</th>
              <th>Quantity</th>
              <th>Dosage Instructions</th>
            </tr>
          </thead>

          <tbody id="viewPrescriptionItemsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
