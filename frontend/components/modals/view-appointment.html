<div class="modal-header">
  <div class="modal-title">
    <h2>Appointment Details</h2>

    <p>Complete appointment information.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <div class="form-grid">
    <div>
      <strong>Appointment ID</strong>
      <p id="viewAppointmentId">-</p>
    </div>

    <div>
      <strong>Status</strong>
      <p id="viewAppointmentStatus">-</p>
    </div>

    <div>
      <strong>Patient</strong>
      <p id="viewAppointmentPatient">-</p>
    </div>

    <div>
      <strong>Doctor</strong>
      <p id="viewAppointmentDoctor">-</p>
    </div>

    <div>
      <strong>Visit Type</strong>
      <p id="viewAppointmentVisitType">-</p>
    </div>

    <div>
      <strong>Date</strong>
      <p id="viewAppointmentDate">-</p>
    </div>

    <div>
      <strong>Time</strong>
      <p id="viewAppointmentTime">-</p>
    </div>

    <div class="full-width">
      <strong>Created At</strong>
      <p id="viewAppointmentCreatedAt">-</p>
    </div>
  </div>
</div>

<div class="modal-footer">
  <button class="btn btn-primary modal-close">Close</button>
</div>
