<div class="modal-header">
  <div class="modal-title">
    <h2>Add Medicine</h2>

    <p>Add a medicine to the inventory.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <form class="form-grid">
    <div class="form-group">
      <label class="form-label">Medicine Name</label>

      <input type="text" class="form-control" placeholder="Medicine Name" />
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>

      <input type="text" class="form-control" placeholder="Category" />
    </div>

    <div class="form-group">
      <label class="form-label">Price</label>

      <input type="number" class="form-control" placeholder="Price" />
    </div>

    <div class="form-group">
      <label class="form-label">Quantity</label>

      <input type="number" class="form-control" placeholder="Stock Quantity" />
    </div>

    <div class="form-group">
      <label class="form-label">Expiry Date</label>

      <input type="date" class="form-control" />
    </div>

    <div class="form-group">
      <label class="form-label">Supplier</label>

      <input type="text" class="form-control" placeholder="Supplier" />
    </div>
  </form>
</div>

<div class="modal-footer">
  <button class="btn btn-secondary">Cancel</button>

  <button class="btn btn-primary">
    <i data-lucide="plus"></i>

    Add Medicine
  </button>
</div>
