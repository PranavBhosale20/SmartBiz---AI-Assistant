<div class="modal-header">
  <div class="modal-title">
    <h2 id="doctorModalTitle">Add Doctor</h2>

    <p id="doctorModalSubtitle">Register a doctor in SmartBiz Clinic OS.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <form id="doctorForm" class="form-grid">
    <input type="hidden" id="doctorId" />

    <div class="full-width">
      <h3 class="form-section-title">Doctor Information</h3>
    </div>

    <!-- ==========================================================
         DOCTOR NAME
    ========================================================== -->

    <div class="form-group full-width">
      <label class="form-label" for="doctorName"> Doctor Name </label>

      <input
        class="form-control"
        type="text"
        id="doctorName"
        placeholder="Enter doctor's full name"
      />
    </div>

    <!-- ==========================================================
         SPECIALIZATION
    ========================================================== -->

    <div class="form-group full-width">
      <label class="form-label" for="specialization"> Specialization </label>

      <select class="form-control" id="specialization">
        <option>General Physician</option>
        <option>Cardiologist</option>
        <option>Dermatologist</option>
        <option>Dentist</option>
        <option>Neurologist</option>
        <option>Orthopedic</option>
        <option>Pediatrician</option>
        <option>Psychiatrist</option>
        <option>ENT Specialist</option>
        <option>Gynecologist</option>
      </select>
    </div>

    <!-- ==========================================================
         OPD TIMINGS
    ========================================================== -->

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="opdStartTime"> OPD Start Time </label>

        <input class="form-control" type="time" id="opdStartTime" />
      </div>

      <div class="form-group">
        <label class="form-label" for="opdEndTime"> OPD End Time </label>

        <input class="form-control" type="time" id="opdEndTime" />
      </div>
    </div>

    <!-- ==========================================================
         SLOT DURATION
    ========================================================== -->

    <div class="form-group full-width">
      <label class="form-label" for="slotDurationMinutes">
        Slot Duration (Minutes)
      </label>

      <input
        class="form-control"
        type="number"
        id="slotDurationMinutes"
        min="5"
        max="120"
        step="5"
        placeholder="30"
      />
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" id="cancelDoctorBtn" class="btn btn-secondary">
    Cancel
  </button>

  <button type="button" id="saveDoctorBtn" class="btn btn-primary">
    <i data-lucide="save"></i>

    <span id="saveDoctorBtnText">Save Doctor</span>
  </button>
</div>
