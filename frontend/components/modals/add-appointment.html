<div class="modal-header">
  <div class="modal-title">
    <h2 id="appointmentModalTitle">Book Appointment</h2>

    <p id="appointmentModalSubtitle">Schedule a new appointment.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <form id="appointmentForm" class="form-grid">
    <input type="hidden" id="appointmentId" />

    <div class="full-width">
      <h3 class="form-section-title">Appointment Details</h3>
    </div>

    <!-- ==========================================================
         PATIENT
    ========================================================== -->

    <div class="form-group">
      <label class="form-label" for="appointmentPatient"> Patient </label>

      <select id="appointmentPatient" class="form-control"></select>
    </div>

    <!-- ==========================================================
         DOCTOR
    ========================================================== -->

    <div class="form-group">
      <label class="form-label" for="appointmentDoctor"> Doctor </label>

      <select id="appointmentDoctor" class="form-control"></select>
    </div>

    <!-- ==========================================================
         VISIT TYPE
    ========================================================== -->

    <div class="form-group">
      <label class="form-label" for="visitType"> Visit Type </label>

      <select id="visitType" class="form-control"></select>
    </div>

    <!-- ==========================================================
         DATE
    ========================================================== -->

    <div class="form-group">
      <label class="form-label" for="appointmentDate"> Appointment Date </label>

      <input id="appointmentDate" type="date" class="form-control" />
    </div>

    <!-- ==========================================================
         TIME
    ========================================================== -->

    <div class="form-group full-width">
      <label class="form-label" for="appointmentTime"> Appointment Time </label>

      <select id="appointmentTime" class="form-control"></select>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary">Cancel</button>

  <button type="button" id="saveAppointmentBtn" class="btn btn-primary">
    <i data-lucide="calendar-plus"></i>

    <span id="saveAppointmentBtnText"> Book Appointment </span>
  </button>
</div>
