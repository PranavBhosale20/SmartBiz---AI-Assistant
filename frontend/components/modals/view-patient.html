<div class="modal-header">
  <div class="modal-title">
    <h2>Patient Details</h2>

    <p>Complete patient information.</p>
  </div>

  <button class="modal-close">
    <i data-lucide="x"></i>
  </button>
</div>

<div class="modal-body">
  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">Patient ID</label>

      <input id="viewPatientId" class="form-control" type="text" readonly />
    </div>

    <div class="form-group">
      <label class="form-label">Full Name</label>

      <input id="viewPatientName" class="form-control" type="text" readonly />
    </div>

    <div class="form-group">
      <label class="form-label">Gender</label>

      <input id="viewPatientGender" class="form-control" type="text" readonly />
    </div>

    <div class="form-group">
      <label class="form-label">Date of Birth</label>

      <input id="viewPatientDob" class="form-control" type="text" readonly />
    </div>

    <div class="form-group">
      <label class="form-label">Phone Number</label>

      <input id="viewPatientPhone" class="form-control" type="text" readonly />
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>

      <input id="viewPatientEmail" class="form-control" type="text" readonly />
    </div>

    <div class="form-group">
      <label class="form-label">Blood Group</label>

      <input
        id="viewPatientBloodGroup"
        class="form-control"
        type="text"
        readonly
      />
    </div>

    <div class="form-group">
      <label class="form-label">Emergency Contact</label>

      <input
        id="viewPatientEmergencyContact"
        class="form-control"
        type="text"
        readonly
      />
    </div>

    <div class="form-group full-width">
      <label class="form-label">Address</label>

      <textarea
        id="viewPatientAddress"
        class="form-control"
        rows="3"
        readonly
      ></textarea>
    </div>

    <div class="form-group full-width">
      <label class="form-label">Created At</label>

      <input
        id="viewPatientCreatedAt"
        class="form-control"
        type="text"
        readonly
      />
    </div>
  </div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-primary modal-close">Close</button>
</div>
