<div class="top-header">
  <!-- Left -->

  <div class="header-left">
    <div class="page-info">
      <h2>Dashboard</h2>

      <p>Clinic Management System</p>
    </div>
  </div>

  <!-- Center -->

  <div class="header-center">
    <div class="search-box">
      <i data-lucide="search"></i>

      <input
        type="text"
        placeholder="Search patients, doctors, appointments..."
      />
    </div>
  </div>

  <!-- Right -->

  <div class="header-right">
    <div class="profile-dropdown">
      <!-- Profile -->

      <div class="profile" id="profileToggle">
        <img id="headerAvatar" src="assets/avatars/doctor.png" alt="User" />

        <div class="profile-info">
          <h4 id="headerUsername">Loading...</h4>

          <span id="headerRole">Loading...</span>
        </div>

        <i data-lucide="chevron-down"></i>
      </div>

      <!-- Dropdown -->

      <div class="profile-menu" id="profileMenu">
        <button class="profile-menu-item" id="profileButton">
          <i data-lucide="user"></i>

          <span>My Profile</span>
        </button>

        <button class="profile-menu-item" id="themeButton">
          <i data-lucide="moon"></i>

          <span>Appearance</span>
        </button>

        <hr />

        <button class="profile-menu-item logout-btn" id="logoutButton">
          <i data-lucide="log-out"></i>

          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</div>
