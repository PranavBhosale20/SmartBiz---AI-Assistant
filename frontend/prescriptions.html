<!doctype html>
<html lang="en" data-page="prescriptions">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Prescriptions | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/logo/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <aside id="sidebar"></aside>

    <div class="main-wrapper">
      <header id="header"></header>

      <main class="page-content">
        <div class="prescriptions-page">
          <div class="page-header">
            <div>
              <h1>Prescriptions</h1>

              <p>Create and manage patient prescriptions.</p>
            </div>

            <button
              class="btn btn-primary open-modal"
              data-modal="add-prescription"
            >
              <i data-lucide="file-plus"></i>

              New Prescription
            </button>
          </div>

          <div class="card prescription-toolbar">
            <div class="toolbar">
              <div class="toolbar-search">
                <i data-lucide="search"></i>

                <input type="text" placeholder="Search prescription..." />
              </div>

              <div class="toolbar-actions">
                <button class="btn btn-secondary">
                  <i data-lucide="filter"></i>

                  Filter
                </button>

                <button class="btn btn-secondary">
                  <i data-lucide="download"></i>

                  Export
                </button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="table-container">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Prescription ID</th>

                      <th>Patient</th>

                      <th>Doctor</th>

                      <th>Date</th>

                      <th>Status</th>

                      <th>Actions</th>
                    </tr>
                  </thead>

                  <tbody>
                    <tr>
                      <td>RX001</td>

                      <td>Rahul Sharma</td>

                      <td>Dr. Mehta</td>

                      <td>12 Jul 2026</td>

                      <td>
                        <span class="status active"> Active </span>
                      </td>

                      <td>
                        <div class="table-actions">
                          <button
                            class="action-btn open-modal"
                            data-modal="view-prescription"
                          >
                            <i data-lucide="eye"></i>
                          </button>

                          <button class="action-btn edit-prescription">
                            <i data-lucide="square-pen"></i>
                          </button>

                          <button
                            class="action-btn open-modal"
                            data-modal="delete-confirmation"
                          >
                            <i data-lucide="trash-2"></i>
                          </button>
                        </div>
                      </td>
                    </tr>

                    <tr>
                      <td>RX002</td>

                      <td>Priya Patil</td>

                      <td>Dr. Joshi</td>

                      <td>11 Jul 2026</td>

                      <td>
                        <span class="status completed"> Completed </span>
                      </td>

                      <td>
                        <div class="table-actions">
                          <button
                            class="action-btn open-modal"
                            data-modal="view-prescription"
                          >
                            <i data-lucide="eye"></i>
                          </button>

                          <button class="action-btn edit-prescription">
                            <i data-lucide="square-pen"></i>
                          </button>

                          <button
                            class="action-btn open-modal"
                            data-modal="delete-confirmation"
                          >
                            <i data-lucide="trash-2"></i>
                          </button>
                        </div>
                      </td>
                    </tr>

                    <tr>
                      <td>RX003</td>

                      <td>Amit Joshi</td>

                      <td>Dr. Kulkarni</td>

                      <td>08 Jul 2026</td>

                      <td>
                        <span class="status expired"> Expired </span>
                      </td>

                      <td>
                        <div class="table-actions">
                          <button
                            class="action-btn open-modal"
                            data-modal="view-prescription"
                          >
                            <i data-lucide="eye"></i>
                          </button>

                          <button class="action-btn edit-prescription">
                            <i data-lucide="square-pen"></i>
                          </button>

                          <button
                            class="action-btn open-modal"
                            data-modal="delete-confirmation"
                          >
                            <i data-lucide="trash-2"></i>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="pagination">
                <button class="page-btn">&lt;</button>

                <button class="page-btn active">1</button>

                <button class="page-btn">2</button>

                <button class="page-btn">&gt;</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer id="footer"></footer>
    </div>

    <div id="modalContainer"></div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="js/components/modal.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>

    <script src="js/loader.js"></script>
    <script src="js/app.js"></script>

    <script src="js/pages/prescriptions.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
