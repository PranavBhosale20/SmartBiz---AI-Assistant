<!doctype html>
<html lang="en" data-page="prescriptions">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Prescriptions | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/logo/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <aside id="sidebar"></aside>

    <div class="main-wrapper">
      <header id="header"></header>

      <main class="page-content">
        <div class="prescriptions-page">
          <div class="page-header">
            <div>
              <h1>Prescriptions</h1>

              <p>Create and manage patient prescriptions.</p>
            </div>

            <button
              class="btn btn-primary open-modal"
              data-modal="add-prescription"
            >
              <i data-lucide="plus"></i>

              Create Prescription
            </button>
          </div>

          <div class="card prescription-toolbar">
            <div class="toolbar">
              <div class="toolbar-search">
                <i data-lucide="search"></i>

                <input type="text" placeholder="Search prescriptions..." />
              </div>

              <div class="toolbar-actions">
                <button class="btn btn-secondary">
                  <i data-lucide="filter"></i>

                  Filter
                </button>

                <button class="btn btn-secondary">
                  <i data-lucide="download"></i>

                  Export
                </button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="table-container">
                <table class="table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Patient</th>
                      <th>Doctor</th>
                      <th>Medicines</th>
                      <th>Date</th>
                      <th>Actions</th>
                    </tr>
                  </thead>

                  <tbody id="prescriptionTableBody"></tbody>
                </table>
              </div>

              <div class="pagination">
                <button class="page-btn">&lt;</button>

                <button class="page-btn active">1</button>

                <button class="page-btn">2</button>

                <button class="page-btn">&gt;</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer id="footer"></footer>
    </div>

    <div id="modalContainer"></div>

    <!-- JavaScript -->

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Components -->
    <script src="js/components/modal.js"></script>
    <script src="js/components/prescription-modal.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>

    <!-- Loader -->
    <script src="js/loader.js"></script>

    <!-- Utilities -->
    <script src="js/utils/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/ui.js"></script>

    <!-- App -->
    <script src="js/app.js"></script>

    <!-- Page -->
    <script src="js/pages/prescriptions.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
