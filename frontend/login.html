<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/icons/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body class="auth-page">
    <div class="auth-container">
      <!-- Left Side -->

      <div class="auth-left">
        <img
          src="assets/logo/smartbiz-logo.png"
          alt="SmartBiz Logo"
          class="auth-logo"
        />

        <h1>SmartBiz Clinic OS</h1>

        <p class="auth-subtitle">AI-Assisted Clinic Management System</p>

        <img
          src="assets/illustrations/login-hero.png"
          alt="Login Illustration"
          class="auth-illustration"
        />
      </div>

      <!-- Right Side -->

      <div class="auth-right">
        <div class="auth-card">
          <h2>Welcome Back</h2>

          <p>Select your role and sign in to continue.</p>

          <form id="loginForm" autocomplete="on">
            <!-- Role Selection -->

            <div class="role-selector">
              <button
                class="role-card active"
                id="staffRole"
                data-role="STAFF"
                type="button"
              >
                <i data-lucide="briefcase-medical"></i>

                <span>Staff</span>
              </button>

              <button
                class="role-card"
                id="patientRole"
                data-role="PATIENT"
                type="button"
              >
                <i data-lucide="user-round"></i>

                <span>Patient</span>
              </button>
            </div>

            <!-- Username -->

            <div class="form-group">
              <label for="username">Username</label>

              <div class="input-group">
                <i data-lucide="user"></i>

                <input
                  type="text"
                  id="username"
                  placeholder="Enter your username"
                  minlength="4"
                  maxlength="20"
                  autocomplete="username"
                  spellcheck="false"
                  required
                />
              </div>
            </div>

            <!-- Password -->

            <div class="form-group">
              <label for="password">Password</label>

              <div class="input-group">
                <i data-lucide="lock"></i>

                <input
                  type="password"
                  id="password"
                  placeholder="Enter your password"
                  minlength="8"
                  autocomplete="current-password"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">
              Login
            </button>
          </form>

          <div class="auth-footer">
            <p>
              Don't have a patient account?

              <a href="register.html">Create Patient Account</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="js/utils/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/ui.js"></script>

    <script src="js/auth/login.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
