<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/icons/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-left">
        <img
          src="assets/logo/smartbiz-logo.png"
          alt="SmartBiz Logo"
          class="auth-logo"
        />

        <h1>SmartBiz Clinic OS</h1>

        <p>AI-Assisted Clinic Management System</p>

        <img
          src="assets/illustrations/login.png"
          alt="Login Illustration"
          class="auth-illustration"
        />
      </div>

      <div class="auth-right">
        <div class="auth-card">
          <h2>Welcome Back</h2>

          <p>Sign in to continue to your dashboard.</p>

          <form id="loginForm">
            <div class="role-selector">
              <input
                type="radio"
                id="staffRole"
                name="role"
                value="STAFF"
                checked
                hidden
              />

              <label for="staffRole" class="role-card">
                <i data-lucide="briefcase-medical"></i>

                <span>Staff</span>
              </label>

              <input
                type="radio"
                id="patientRole"
                name="role"
                value="PATIENT"
                hidden
              />

              <label for="patientRole" class="role-card">
                <i data-lucide="user-round"></i>

                <span>Patient</span>
              </label>
            </div>

            <div class="form-group">
              <label>Username</label>

              <div class="input-group">
                <i data-lucide="user"></i>

                <input
                  type="text"
                  id="username"
                  placeholder="Enter username"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label>Password</label>

              <div class="input-group">
                <i data-lucide="lock"></i>

                <input
                  type="password"
                  id="password"
                  placeholder="Enter password"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">
              Login
            </button>
          </form>

          <div class="auth-footer">
            <p>
              New Patient?

              <a href="register.html"> Create Account </a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="js/utils/api.js"></script>

    <script src="js/utils/auth.js"></script>

    <script src="js/auth/login.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
