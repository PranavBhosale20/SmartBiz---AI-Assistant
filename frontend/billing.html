<!doctype html>
<html lang="en" data-page="billing">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Billing | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/logo/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <aside id="sidebar"></aside>

    <div class="main-wrapper">
      <header id="header"></header>

      <main class="page-content">
        <div class="billing-page">
          <div class="page-header">
            <div>
              <h1>Billing</h1>

              <p>Generate invoices and manage payments.</p>
            </div>

            <button class="btn btn-primary open-modal" data-modal="create-bill">
              <i data-lucide="receipt"></i>

              Create Bill
            </button>
          </div>

          <div class="card billing-toolbar">
            <div class="toolbar">
              <div class="toolbar-search">
                <i data-lucide="search"></i>

                <input type="text" placeholder="Search bill..." />
              </div>

              <div class="toolbar-actions">
                <button class="btn btn-secondary">
                  <i data-lucide="filter"></i>

                  Filter
                </button>

                <button class="btn btn-secondary">
                  <i data-lucide="download"></i>

                  Export
                </button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="table-container">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Invoice No.</th>

                      <th>Patient</th>

                      <th>Amount</th>

                      <th>Date</th>

                      <th>Status</th>

                      <th>Actions</th>
                    </tr>
                  </thead>

                  <tbody id="billingTableBody"></tbody>
                </table>
              </div>

              <div class="pagination">
                <button class="page-btn">&lt;</button>

                <button class="page-btn active">1</button>

                <button class="page-btn">2</button>

                <button class="page-btn">&gt;</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer id="footer"></footer>
    </div>

    <div id="modalContainer"></div>

    <!-- JavaScript -->

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Components -->
    <script src="js/components/modal.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>

    <!-- Loader -->
    <script src="js/loader.js"></script>

    <!-- Utilities -->
    <script src="js/utils/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/ui.js"></script>

    <!-- App -->
    <script src="js/app.js"></script>

    <!-- Page -->
    <script src="js/pages/billing.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
