<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create Patient Account | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/logo/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body class="auth-page">
    <div class="auth-container">
      <!-- Left Side -->

      <div class="auth-left">
        <img
          src="assets/logo/smartbiz-logo.png"
          alt="SmartBiz Logo"
          class="auth-logo"
        />

        <h1>SmartBiz Clinic OS</h1>

        <p class="auth-subtitle">AI-Assisted Clinic Management System</p>

        <div class="auth-illustration">
          <img
            src="assets/illustrations/login-hero.png"
            alt="Patient Registration"
          />
        </div>
      </div>

      <!-- Right Side -->

      <div class="auth-right">
        <div class="auth-header">
          <h1>Create Patient Account</h1>

          <p>
            Register as a patient to book appointments, view prescriptions and
            manage your clinic visits.
          </p>
        </div>

        <!-- Registration Form -->

        <form id="registerForm" class="auth-form">
          <!-- Full Name -->

          <div class="form-group">
            <label for="fullName">Full Name</label>

            <div class="input-group">
              <i data-lucide="user"></i>

              <input
                type="text"
                id="fullName"
                placeholder="Enter your full name"
                required
              />
            </div>
          </div>

          <!-- Username -->

          <div class="form-group">
            <label for="username">Username</label>

            <div class="input-group">
              <i data-lucide="at-sign"></i>

              <input
                type="text"
                id="username"
                placeholder="Choose a username"
                required
              />
            </div>
          </div>

          <!-- Email -->

          <div class="form-group">
            <label for="email">Email Address</label>

            <div class="input-group">
              <i data-lucide="mail"></i>

              <input
                type="email"
                id="email"
                placeholder="Enter your email address"
                required
              />
            </div>
          </div>

          <!-- Phone -->

          <div class="form-group">
            <label for="phone">Phone Number</label>

            <div class="input-group">
              <i data-lucide="phone"></i>

              <input
                type="tel"
                id="phone"
                placeholder="Enter 10-digit mobile number"
                maxlength="10"
                minlength="10"
                inputmode="numeric"
                pattern="[0-9]{10}"
                required
              />
            </div>
          </div>

          <!-- Gender -->

          <div class="form-group">
            <label>Gender</label>

            <div class="role-selector">
              <button
                type="button"
                class="role-card active"
                id="maleCard"
                data-gender="MALE"
              >
                <i data-lucide="mars"></i>

                <span>Male</span>
              </button>

              <button
                type="button"
                class="role-card"
                id="femaleCard"
                data-gender="FEMALE"
              >
                <i data-lucide="venus"></i>

                <span>Female</span>
              </button>
            </div>

            <input type="hidden" id="gender" value="MALE" />
          </div>

          <!-- Password -->

          <div class="form-group">
            <label for="password">Password</label>

            <div class="input-group">
              <i data-lucide="lock"></i>

              <input
                type="password"
                id="password"
                placeholder="Create a password"
                required
              />
            </div>
          </div>

          <!-- Confirm Password -->

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>

            <div class="input-group">
              <i data-lucide="shield-check"></i>

              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary auth-btn">
            Create Patient Account
          </button>
        </form>

        <p class="auth-footer">
          Already have an account?

          <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="js/utils/api.js"></script>

    <script src="js/utils/auth.js"></script>

    <script src="js/utils/ui.js"></script>

    <script src="js/auth/register.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
