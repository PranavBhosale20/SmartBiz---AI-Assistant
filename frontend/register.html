<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create Account | SmartBiz Clinic OS</title>

    <link rel="icon" href="assets/logo/favicon.png" />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body class="auth-page">
    <div class="auth-container">
      <!-- Left Side -->
      <div class="auth-left">
        <!-- Logo -->

        <img
          src="assets/logo/smartbiz-logo.png"
          alt="SmartBiz Logo"
          class="auth-logo"
        />

        <!-- Title -->

        <h1>SmartBiz Clinic OS</h1>

        <p class="auth-subtitle">AI-Assisted Clinic Management System</p>

        <!-- Illustration -->

        <div class="auth-illustration">
          <img
            src="assets/illustrations/login-hero.png"
            alt="Register Illustration"
          />
        </div>
      </div>
      <!-- Right Side -->
      <div class="auth-right">
        <!-- Heading -->

        <div class="auth-header">
          <h1>Create Account</h1>

          <p>Join SmartBiz Clinic OS.</p>
        </div>

        <!-- Role Selection -->

        <div class="role-selector">
          <button
            class="role-card active"
            id="staffRole"
            data-role="staff"
            type="button"
          >
            <i data-lucide="briefcase-medical"></i>

            <span>Staff</span>
          </button>

          <button
            class="role-card"
            id="patientRole"
            data-role="patient"
            type="button"
          >
            <i data-lucide="user"></i>

            <span>Patient</span>
          </button>
        </div>

        <!-- Registration Form -->

        <form id="registerForm" class="auth-form">
          <!-- Full Name -->
          <div class="form-group">
            <label>Full Name</label>

            <div class="input-group">
              <i data-lucide="user"></i>
              <input type="text" id="fullName" placeholder="Enter full name" />
            </div>
          </div>

          <!-- Username -->
          <div class="form-group">
            <label>Username</label>

            <div class="input-group">
              <i data-lucide="at-sign"></i>
              <input type="text" id="username" placeholder="Choose username" />
            </div>
          </div>

          <!-- Patient Fields -->
          <div class="patient-fields">
            <div class="form-group">
              <label>Email</label>

              <div class="input-group">
                <i data-lucide="mail"></i>
                <input type="email" id="email" placeholder="Enter email" />
              </div>
            </div>

            <div class="form-group">
              <label>Phone</label>

              <div class="input-group">
                <i data-lucide="phone"></i>
                <input type="text" id="phone" placeholder="+91 9876543210" />
              </div>
            </div>
          </div>

          <!-- Staff Fields -->
          <div class="staff-fields">
            <div class="form-group">
              <label>Role</label>

              <select id="role" class="form-select">
                <option value="ADMIN">Administrator</option>
                <option value="RECEPTIONIST">Receptionist</option>
              </select>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label>Password</label>

            <div class="input-group">
              <i data-lucide="lock"></i>
              <input
                type="password"
                id="password"
                placeholder="Create password"
              />
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label>Confirm Password</label>

            <div class="input-group">
              <i data-lucide="shield-check"></i>
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm password"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary auth-btn">
            Create Account
          </button>
        </form>

        <!-- Footer -->

        <p class="auth-footer">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="js/auth/register.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
